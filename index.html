<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProspectMap - Prospection Immobilière</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🗺️ ProspectMap</h1>
                <p class="subtitle">Prospection Immobilière</p>
            </div>

            <nav class="nav-menu">
                <button class="nav-btn active" data-section="map">
                    <i class="fas fa-map"></i> <span>Carte</span>
                </button>
                <button class="nav-btn" data-section="history">
                    <i class="fas fa-history"></i> <span>Historique</span>
                </button>
                <button class="nav-btn" data-section="reminders">
                    <i class="fas fa-bell"></i> <span>Rappels</span>
                    <span class="badge" id="reminder-badge">0</span>
                </button>
                <button class="nav-btn" data-section="stats">
                    <i class="fas fa-chart-bar"></i> <span>Stats</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <button class="btn-export" onclick="document.getElementById('import-file').click()">
                    <i class="fas fa-upload"></i> Importer
                </button>
                <button class="btn-import" onclick="app.exportData()">
                    <i class="fas fa-download"></i> Exporter
                </button>
            </div>

            <input type="file" id="import-file" style="display:none" accept=".json" onchange="app.importData(event)">
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- MAP SECTION -->
            <section id="map-section" class="content-section active">
                <div class="map-header">
                    <h2>🗺️ Carte Interactive</h2>
                    <div class="map-controls">
                        <button class="btn-icon" title="Ajouter un point" onclick="app.addPointMode()">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button class="btn-icon" title="Tracer une ligne" onclick="app.drawLineMode()">
                            <i class="fas fa-pen-fancy"></i>
                        </button>
                        <button class="btn-icon" title="Mode Suppression" onclick="app.deleteMode()">
                            <i class="fas fa-trash"></i>
                        </button>
                        <button class="btn-icon" title="Ma localisation" onclick="app.getUserLocation()">
                            <i class="fas fa-location-arrow"></i>
                        </button>
                        <button class="btn-icon" title="Réinitialiser" onclick="app.resetMap()">
                            <i class="fas fa-home"></i>
                        </button>
                        <button class="btn-icon" title="Terminer la ligne" onclick="app.finishLine()">
                            <i class="fas fa-check"></i>
                        </button>
                    </div>
                </div>
                <div class="map-container" id="map"></div>

                <!-- Info Panel pour Points -->
                <div id="info-panel" class="info-panel hidden">
                    <div class="info-header">
                        <h3>📍 Détails du Point</h3>
                        <button class="btn-close" onclick="app.closeInfoPanel()">×</button>
                    </div>
                    <div class="info-content">
                        <div class="form-group">
                            <label>Type:</label>
                            <select id="point-type">
                                <option value="prospect">🔵 Prospect</option>
                                <option value="property">🟠 À Vendre</option>
                                <option value="client">🟢 Client</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Adresse:</label>
                            <input type="text" id="point-address" placeholder="Adresse du point">
                        </div>
                        <div class="form-group">
                            <label>Notes:</label>
                            <textarea id="point-notes" placeholder="Notes sur ce point..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Date:</label>
                            <input type="date" id="point-date">
                        </div>
                        <button class="btn-primary" onclick="app.savePoint()">
                            <i class="fas fa-save"></i> Enregistrer
                        </button>
                        <button class="btn-secondary" onclick="app.deletePoint()">
                            <i class="fas fa-trash"></i> Supprimer
                        </button>
                        <button class="btn-secondary" onclick="app.closeInfoPanel()">
                            <i class="fas fa-times"></i> Fermer
                        </button>
                    </div>
                </div>
            </section>

            <!-- HISTORY SECTION -->
            <section id="history-section" class="content-section">
                <div class="section-header">
                    <h2>📋 Historique</h2>
                    <div class="filters">
                        <input type="text" id="search-input" placeholder="🔍 Rechercher..." onkeyup="app.filterHistory()">
                        <select id="type-filter" onchange="app.filterHistory()">
                            <option value="">Tous les types</option>
                            <option value="prospect">🔵 Prospects</option>
                            <option value="property">🟠 À Vendre</option>
                            <option value="client">🟢 Clients</option>
                        </select>
                    </div>
                </div>
                <div class="history-list" id="history-list"></div>
            </section>

            <!-- REMINDERS SECTION -->
            <section id="reminders-section" class="content-section">
                <div class="section-header">
                    <h2>🔔 Rappels de Suivi</h2>
                </div>
                <div class="reminders-list" id="reminders-list"></div>
            </section>

            <!-- STATS SECTION -->
            <section id="stats-section" class="content-section">
                <div class="section-header">
                    <h2>📊 Statistiques</h2>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="stat-total">0</div>
                        <div class="stat-label">Points Total</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-today">0</div>
                        <div class="stat-label">Aujourd'hui</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-week">0</div>
                        <div class="stat-label">Cette Semaine</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-pending">0</div>
                        <div class="stat-label">En Attente</div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="notification-toast" class="notification-hidden"></div>

    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <!-- Application JS -->
    <script src="app.js"></script>
</body>
</html>
